[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

# Runs every 30 minutes. Cron syntax: minute hour day month weekday.
[functions."salesforce-sync"]
  schedule = "*/30 * * * *"

# Runs every 6 hours. Cron syntax: minute hour day month weekday.
[functions."overdue-tasks-check"]
  schedule = "0 */6 * * *"
